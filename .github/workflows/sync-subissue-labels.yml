name: Sync Subissue Labels

on:
  issues:
    types: [opened, edited]

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Check for parent issues
        uses: actions/github-script@v5
        with:
          script: |
            const { data: issue } = await github.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            // Get parent issues using issue relationships endpoint
            const { data: relationships } = await github.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number
            });

            const parentIssues = relationships.filter(comment => comment.body.includes('/parent')).map(comment => comment.body.split('/parent')[1].trim());

            // If parent issues found, apply labels
            if (parentIssues.length > 0) {
              const labelToApply = 'parent'; // or any logic to determine labels
              for (const parentIssue of parentIssues) {
                await github.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: parentIssue,
                  labels: [labelToApply]
                });
              }
            }
